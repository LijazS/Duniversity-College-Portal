apiVersion: apps/v1 
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: uni-ns
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: uni-app
  template:
    metadata:
      labels:
        app: uni-app
    spec:
      containers:
      - name: uni-container
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports: 
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: uni-config
        
    