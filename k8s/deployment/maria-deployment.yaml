apiVersion: apps/v1 
kind: Deployment
metadata:
  name: mariadb
  namespace: uni-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb 
  template:
    metadata:
      labels:
        app: mariadb
    containers:
    - name: mariadb-container
      image: mariadb:11
      ports:
      - containerPort: 3306
      envFrom:
        configMapRef:
        - name: uni-config
      volumeMounts:
      - name: mariadb-storage
        mountPath: /var/lib/mysql
      
      - name: mariadb-init
        mountPath: /docker-entrypoint-initdb.d
    volumes:
    - name: mariadb-storage
      persistentVolumeClaim: 
        claimName: uni-pvc
    
    - name: mariadb-init
      configMap:
        name: mariadb-init-script