apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: uni-route
  namespace: uni-ns
spec:
  parentRefs:
  - name: sales-gateway
    namespace: sales-gateway-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: uni-service
      port: 3000
