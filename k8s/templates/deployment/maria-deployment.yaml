apiVersion: apps/v1 
kind: StatefulSet
metadata:
  name: {{ .Values.db.name }}
  namespace: {{ .Values.appNs }}
spec:
  replicas: {{ .Values.db.replicaCount }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  serviceName: mariadb
  selector:
    matchLabels:
      app: mariadb 
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
      - name: mariadb-container
        image: {{ .Values.db.image.name }}:{{ .Values.db.image.tag }}
        ports:
        - containerPort: 3306
        envFrom:
        - configMapRef:
            name: {{ .Values.frontendConfig }}
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
        
        - name: mariadb-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:

      - name: mariadb-init
        configMap:
          name: mariadb-init-script
  volumeClaimTemplates:
  - metadata:
      name: mariadb-storage
    spec:
      storageClassName: {{ .Values.db.storageClassName }}
      accessModes:
      - ReadWriteMany
      resources:
        requests:
          storage: 2Gi