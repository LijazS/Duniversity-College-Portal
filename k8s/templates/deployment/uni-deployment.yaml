apiVersion: apps/v1 
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.appNs }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app: uni-app
  template:
    metadata:
      labels:
        app: uni-app
    spec:
      containers:
      - name: uni-container
        image: {{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}
        ports: 
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: {{ .Values.frontendConfig }}
        
    